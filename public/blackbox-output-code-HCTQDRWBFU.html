<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Digital Clock</title>
<style>
@import url('https://fonts.googleapis.com/css?family=Roboto+Condensed:300');

:root {
  --size: 86px;
}

body {
  text-align: center;
  background-color: hsl(210, 30%, 8%);
  color: hsla(210, 20%, 90%, 0.89);
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 300;
  overflow: hidden;
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.column,
.colon {
  display: inline-block;
  vertical-align: top;
  font-size: var(--size);
  line-height: var(--size);
  user-select: none;
}

.column {
  transition: transform 300ms;
  height: calc(var(--size) * 10);
  overflow: hidden;
}

.colon {
  transition: transform 300ms;
  transform: translateY(calc(50vh - (var(--size) / 2)));
  width: calc(var(--size) / 2);
  position: relative;
}

.colon::after {
  content: ':';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: hsla(210, 20%, 90%, 0.89);
}

.num {
  transition: opacity 500ms, text-shadow 100ms;
  opacity: 0.025;
  height: var(--size);
  line-height: var(--size);
}

.num.visible {
  opacity: 1.0;
  text-shadow: 1px 1px 0px hsl(210, 50%, 40%);
}

.num.close {
  opacity: 0.35;
}

.num.far {
  opacity: 0.15;
}

.num.distant {
  opacity: 0.1;
}
</style>
</head>
<body>

<div id="clock"></div>

<script>
// Create the clock structure dynamically
const clock = document.getElementById('clock');
const size = 86;
const classList = ['visible', 'close', 'far', 'far', 'distant', 'distant'];
const use24HourClock = true;

// Number of columns: 6 (HH MM SS)
// For each column, create digits vertically stacked
// For columns 1,3,5 (odd index), add colon after them except last

for (let j = 0; j < 6; j++) {
  const column = document.createElement('div');
  column.className = 'column';

  // Number of digits per column:
  // For first column (j=0): 3 digits (0,1,2)
  // For others: 10 digits (0-9)
  const digitsCount = j === 0 ? 3 : (10 - (!(j % 2) * 4)); // same as original logic

  for (let i = 0; i < digitsCount; i++) {
    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = i;
    column.appendChild(num);
  }

  clock.appendChild(column);

  // Add colon after odd columns except last
  if (j % 2 === 1 && j < 5) {
    const colon = document.createElement('div');
    colon.className = 'colon';
    clock.appendChild(colon);
  }
}

const columns = Array.from(document.getElementsByClassName('column'));

function padClock(p, n) {
  return p + ('0' + n).slice(-2);
}

function getClock() {
  const d = new Date();
  return [
    use24HourClock ? d.getHours() : (d.getHours() % 12 || 12),
    d.getMinutes(),
    d.getSeconds()
  ].reduce(padClock, '');
}

function getClass(n, i2) {
  return classList.find((class_, classIndex) => Math.abs(n - i2) === classIndex) || '';
}

function updateClock() {
  const c = getClock();

  columns.forEach((ele, i) => {
    const n = +c[i];
    const offset = -n * size;
    ele.style.transform = `translateY(calc(50vh + ${offset}px - ${size / 2}px))`;
    Array.from(ele.children).forEach((ele2, i2) => {
      ele2.className = 'num ' + getClass(n, i2);
    });
  });
}

// Initial update
updateClock();

// Update every ~220ms
setInterval(updateClock, 200 + Math.E * 10);
</script>

</body>
</html>
